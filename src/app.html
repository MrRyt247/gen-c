<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#2e63f0" />
		<meta name="description" content="UroScan — lab-grade urinalysis from a $0.10 strip and your phone camera. Plain-language results, trends, and gentle guidance." />

		<!-- SF Pro Display is self-hosted (see app.css). IBM Plex Mono carries all lab data. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>

		<!-- Apply persisted dark theme before paint, only when explicitly chosen. -->
		<script>
			try {
				if (localStorage.getItem('uroscan-theme') === 'dark') {
					document.documentElement.classList.add('dark');
				}
			} catch {}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
